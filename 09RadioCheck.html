<!DOCTYPE html>
<html>
    <head>
        <title>Archivo Base Vía CDN</title>
        <meta name="viewport" content="widht=device-widht, initial-scale=1"></meta>
        <meta charset="utf-8">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </head>
    <body>
        <div class="container-fluid">
            <h1>Aprendiendo Radios y Checkbox</h1>
            <h2>Seleccionar los idiomas que hablas</h2>
            <li class="list-group-item">
                <input class="form-check-input me-1" type="checkbox" id="espanol">
                <label class="form-check-label" for="espanol">Español</label>
            </li>
            <li class="list-group-item">
                <input class="form-check-input me-1" type="checkbox" id="ingles">
                <label class="form-check-label" for="ingles">Ingles</label>
            </li>
            <li class="list-group-item">
                <input class="form-check-input me-1" type="checkbox" id="frances">
                <label class="form-check-label" for="frances">Frances</label>
            </li>
            <li class="list-group-item">
                <input class="form-check-input me-1" type="checkbox" id="italiano">
                <label class="form-check-label" for="italiano">Italiano</label>
            </li>
            
            <h2>Selecciona un sabor de helado favorito (solo puedes elegir 1 sabor)</h2>
            <ul class="list-group">
                <li class="list-group-item">
                    <input class="form-check-input me-1" type="radio" name="saborHelado" id="vainilla">
                    <label class="form-check-label" for="vainilla">Vainilla</label>
                </li>
                <li class="list-group-item">
                    <input class="form-check-input me-1" type="radio" name="saborHelado" id="fresa">
                    <label class="form-check-label" for="fresa">Fresa</label>
                </li>
                <li class="list-group-item">
                    <input class="form-check-input me-1" type="radio" name="saborHelado" id="chocolate">
                    <label class="form-check-label" for="chocolate">Chocolate</label>
                </li>
                <li class="list-group-item">
                    <input class="form-check-input me-1" type="radio" name="saborHelado" id="tequila">
                    <label class="form-check-label" for="tequila">Tequila</label>
                </li>
            </ul>

            



        </div>
    </body>
</html>
