<!DOCTYPE html>
<html>
    <head>
        <title>Archivo Base Vía CDN</title>
        <meta name="viewport" content="widht=device-widht, initial-scale=1"></meta>
        <meta charset="utf-8">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <style>
                img{
                    border: 2px solid black;
                    margin: 10px;
                }



        </style>
    </head>
    <body>
        <div class="container-fluid">
            <h1>Aprendiendo Bordes</h1>
            <img src="img/FotoSombra1.png" width="75" class="border">
            <img src="img/FotoSombra1.png" width="75" class="border-top">
            <img src="img/FotoSombra1.png" width="75" class="border-start">
            <img src="img/FotoSombra1.png" width="75" class="border-end">
            <img src="img/FotoSombra1.png" width="75" class="border-button">

            <h1>Border Color</h1>
            <img src="img/FotoSombra1.png" width="75" class="border border-primary">
            <img src="img/FotoSombra1.png" width="75" class="border border-secondary">
            <img src="img/FotoSombra1.png" width="75" class="border border-success">
            <img src="img/FotoSombra1.png" width="75" class="border border-danger">
            <img src="img/FotoSombra1.png" width="75" class="border border-info">
            <img src="img/FotoSombra1.png" width="75" class="border border-black">


            <h1>Border Redondo</h1>
            <img src="img/FotoSombra1.png" width="75" class="rounded border-secondary">
            <img src="img/FotoSombra1.png" width="75" class="rounded border-primary">
            <img src="img/FotoSombra1.png" width="75" class="rounded border-success">
            <img src="img/FotoSombra1.png" width="75" class="rounded border-danger">
            <img src="img/FotoSombra1.png" width="75" class="rounded border-info">
            <img src="img/FotoSombra1.png" width="75" class="rounded border-black">




        </div>
    </body>
</html>
