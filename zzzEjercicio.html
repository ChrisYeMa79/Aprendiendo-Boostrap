<!DOCTYPE html>
<html>
    <head>
        <title>Archivo Base Vía CDN</title>
        <meta name="viewport" content="widht=device-widht, initial-scale=1"></meta>
        <meta charset="utf-8">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </head>
    <body>
        <div class="alert alert-info">
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                <strong>Exitoso</strong> El Formulario Se lleno Exitosamente !!

            </div>
        <div class="container-fluid text-center">
            <h1>Compra de viaje</h1>
        </div>
        <div class="container-fluid mt-3">
            <label>Nombre Completo</label>
            <input type="text">
        </div>
        <div class="container-fluid mt-3">
            <label>Destino</label>
            <input type="text">
        </div>

        <div class="container-fluid mt-3">
            <label>Fecha de Salida</label>
            <input type="date">

            <label>Fecha de Regreso</label>
            <input type="date">
        </div>
        <br>

        <h2>Selecciona el tipo de viaje que realizas</h2>
            <ul class="list-group mt-3">
                <li class="list-group-item">
                    <input class="form-check-input me-1" type="radio" name="saborHelado" id="vainilla">
                    <label class="form-check-label" for="vainilla">Negocios</label>
                </li>
                <li class="list-group-item">
                    <input class="form-check-input me-1" type="radio" name="saborHelado" id="fresa">
                    <label class="form-check-label" for="fresa">Placer </label>
                </li>
            </ul>
            <br>

        <h2>Servicios Adicionales</h2>
            <li class="list-group-item">
                <input class="form-check-input me-1" type="checkbox" id="espanol">
                <label class="form-check-label" for="espanol">Hospedaje</label>
            </li>
            <li class="list-group-item">
                <input class="form-check-input me-1" type="checkbox" id="ingles">
                <label class="form-check-label" for="ingles">Transporte</label>
            </li>
            <li class="list-group-item">
                <input class="form-check-input me-1" type="checkbox" id="frances">
                <label class="form-check-label" for="frances">Restaurantes</label>
            </li>

        <div class="container-fluid text-center">
            <button class="btn btn-outline-primary btn-md">Enviar</button>


        </div>




    </body>
</html>
